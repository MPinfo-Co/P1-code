# 規格說明：https://github.com/MPinfo-Co/P1-project/blob/main/docs/github-workflow/c-workflow.md
name: C-workflow（CI）

on:
  push:
    branches:
      - 'issue-*'
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  backend-ci:
    name: Backend CI（Ruff + Pytest）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest with coverage
        run: pytest tests/ -v; code=$?; [ $code -eq 5 ] && exit 0 || exit $code

  frontend-ci:
    name: Frontend CI（ESLint + Prettier）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check src/

  notify-test-env:
    name: Notify PG to Set Up Test Environment
    runs-on: ubuntu-latest
    if: startsWith(github.event.pull_request.head.ref, 'issue-')

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/^issue-(\d+)/);
            const issueNum = match ? match[1] : '?';

            const body = [
              '🧪 **PR 已建立，請設定測試環境**',
              '',
              '## PG 測試環境 Checklist',
              '',
              '- [ ] 本地啟動後端：`cd backend && uvicorn main:app --reload`',
              '- [ ] 本地啟動前端：`cd frontend && npm run dev`',
              '- [ ] 確認資料庫連線正常',
              '- [ ] 依照 TestPlan 逐一執行測試案例，填寫測試報告',
              '',
              `測試報告請存放於 \`PG測試報告/issue-${issueNum}.md\`（N = PG Issue 編號）。`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  generate-version-diff:
    name: Generate VersionDiff
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'issue-')

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Generate VersionDiff file
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const match = branchName.match(/^issue-(\d+)-/);
            const issueNum = match ? match[1] : branchName.replace(/^issue-/, '').split('-')[0];
            const author = context.payload.pull_request.user.login;
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const headSha = context.payload.pull_request.head.sha;
            const baseSha = context.payload.pull_request.base.sha;
            const prTitle = context.payload.pull_request.title;

            // Fetch changed files
            const filesResp = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 300,
            });

            let fileLines = '';
            if (filesResp.data.length === 0) {
              fileLines = '- （本次無程式碼異動）';
            } else {
              fileLines = filesResp.data
                .map(f => `- ${f.filename}：${f.status}`)
                .join('\n');
            }

            const content = [
              `# VersionDiff：Issue #${issueNum} ${prTitle}`,
              '',
              '## 修改項目及內容',
              '<!-- 由 GitHub Actions 自動產生 -->',
              fileLines,
              '',
              '## 關聯項目',
              `- PG Issue：P1-code #${issueNum}`,
              `- 上一個 commit：${baseSha.slice(0, 7)}`,
              `- 本次 commit：${headSha.slice(0, 7)}`,
            ].join('\n');

            const filePath = `VersionDiff/issue-${issueNum}_${author}_${date}.md`;
            const encodedContent = Buffer.from(content).toString('base64');

            // Try to get existing file sha for update
            let existingSha;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filePath,
              });
              existingSha = existing.data.sha;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `chore: auto-generate VersionDiff for issue-${issueNum}`,
              content: encodedContent,
              ...(existingSha ? { sha: existingSha } : {}),
              committer: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com',
              },
              author: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com',
              },
            });

            console.log(`VersionDiff file created: ${filePath}`);

            // 關閉 PG Issue
            const pgIssueNum = parseInt(issueNum);
            if (!isNaN(pgIssueNum)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pgIssueNum,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`PG Issue #${pgIssueNum} 已自動關閉`);
            }
