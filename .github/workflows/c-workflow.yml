name: C-workflow（CI）

on:
  push:
    branches:
      - 'issue-*'
  pull_request:
    types: [opened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-ci:
    name: Backend CI（Ruff + Pytest）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest tests/ -v

  frontend-ci:
    name: Frontend CI（ESLint）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  notify-test-env:
    name: Notify PG to Set Up Test Environment
    runs-on: ubuntu-latest
    if: startsWith(github.event.pull_request.head.ref, 'issue-')

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/^issue-(\d+)/);
            const issueNum = match ? match[1] : '?';

            const body = `🧪 **PR 已建立，請設定測試環境**

## PG 測試環境 Checklist

- [ ] 本地啟動後端：\`cd backend && uvicorn main:app --reload\`
- [ ] 本地啟動前端：\`cd frontend && npm run dev\`
- [ ] 確認資料庫連線正常
- [ ] 依照 TestPlan 逐一執行測試案例，填寫測試報告

測試報告請存放於 \`PG測試報告/issue-${issueNum}.md\`（N = PG Issue 編號）。`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
