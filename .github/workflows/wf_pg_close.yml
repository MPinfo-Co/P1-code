name: PG Close

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  close-issues:
    name: Close Issues
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'pg-')

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: MPinfo-Co

      - name: Close PG Issue and Epic Issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const match = branchName.match(/^pg-(\d+)-/);
            const issueNum = match ? match[1] : branchName.replace(/^pg-/, '').split('-')[0];

            const pgIssueNum = parseInt(issueNum);
            if (!isNaN(pgIssueNum)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pgIssueNum,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`PG Issue #${pgIssueNum} 已自動關閉`);

              try {
                const pgIssue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pgIssueNum,
                });
                const epicMatch = pgIssue.data.body?.match(/Epic：MPinfo-Co\/P1-project#(\d+)/);
                if (epicMatch) {
                  const epicNum = parseInt(epicMatch[1]);
                  await github.rest.issues.update({
                    owner: 'MPinfo-Co',
                    repo: 'P1-project',
                    issue_number: epicNum,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  console.log(`Epic Issue #${epicNum} 已自動關閉`);
                }
              } catch (e) {
                console.log(`Epic Issue 關閉失敗（非阻斷性）：${e.message}`);
              }
            }
